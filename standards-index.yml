  - id: design-system
    keywords:
      [design, color, typography, shadcn, tailwind tokens, components, ui]
    files:
      - design-os/design-system.md

  - id: screens
    keywords: [screen, mockup, figma, layout, ui spec, wireframe, design spec]
    files:
      - design-os/product-vision.md
