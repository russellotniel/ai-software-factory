# Standards Index
#
# Maps topics and keywords to the documents that define the relevant standards.
# Used by /inject-standards and by commands that need to load only relevant context.
# Update this file whenever a new standards document is added.

standards:
  - id: product-mission
    keywords: [project, product, mission, users, personas, use cases, scope]
    files:
      - foundation/product-mission.md

  - id: principles
    keywords: [principles, rules, non-negotiable, always, never]
    files:
      - foundation/principles.md

  - id: tech-stack
    keywords:
      [nextjs, next.js, supabase, tailwind, typescript, node, stack, versions]
    files:
      - foundation/tech-standards.md

  - id: auth
    keywords: [auth, authentication, keycloak, session, jwt, user, login, oauth]
    files:
      - foundation/auth-model.md

  - id: compliance
    keywords: [security, owasp, compliance, hipaa, audit, gdpr, regulation]
    files:
      - foundation/compliance-standards.md

  - id: mcp
    keywords: [mcp, supabase mcp, playwright mcp, figma mcp, tools, claude code]
    files:
      - foundation/mcp-setup.md

  - id: schema
    keywords:
      [
        table,
        migration,
        schema,
        postgres,
        column,
        index,
        rls,
        row level security,
        tenant_id
      ]
    files:
      - architecture-os/schema-conventions.md

  - id: rpc
    keywords:
      [
        rpc,
        function,
        stored procedure,
        security definer,
        security invoker,
        plpgsql
      ]
    files:
      - architecture-os/rpc-standards.md

  - id: api-contracts
    keywords:
      [api, route handler, server action, endpoint, contract, input, output]
    files:
      - architecture-os/api-contracts.md

  - id: audit
    keywords: [audit, audit trail, audit log, log changes, who changed, history]
    files:
      - architecture-os/audit-trail.md

  - id: system-design
    keywords: [architecture, system design, adr, decision, proxy, middleware]
    files:
      - architecture-os/system-design.md

  - id: implementation
    keywords:
      [
        server action,
        zod,
        validation,
        safeParse,
        ActionResult,
        requireAuth,
        component,
        form,
        react hook form
      ]
    files:
      - implementation-os/standards.md

  - id: caching
    keywords:
      [
        cache,
        caching,
        use cache,
        cacheLife,
        cacheTag,
        revalidateTag,
        unstable_cache
      ]
    files:
      - data-fetching-os/caching-strategy.md

  - id: data-fetching
    keywords:
      [
        server component,
        client component,
        tanstack query,
        useQuery,
        hydration,
        realtime,
        fetch
      ]
    files:
      - data-fetching-os/server-vs-client.md

  - id: testing
    keywords:
      [
        test,
        vitest,
        playwright,
        e2e,
        unit,
        component,
        coverage,
        tenant isolation
      ]
    files:
      - qa-os/strategy.md

  - id: ci-cd
    keywords:
      [
        github actions,
        workflow,
        ci,
        cd,
        pipeline,
        docker,
        build,
        deploy,
        semantic-release
      ]
    files:
      - deployment-os/ci-cd.md

  - id: environments
    keywords:
      [
        environment,
        env,
        staging,
        production,
        configmap,
        next-runtime-env,
        NEXT_PUBLIC
      ]
    files:
      - deployment-os/environments.md

  - id: release
    keywords:
      [
        release,
        version,
        tag,
        hotfix,
        branching,
        squash,
        merge,
        conventional commits
      ]
    files:
      - deployment-os/release-process.md

  - id: kubernetes
    keywords:
      [
        kubernetes,
        k8s,
        deployment,
        pod,
        resource,
        cpu,
        memory,
        hpa,
        ingress,
        manifest
      ]
    files:
