# Gunawan Standards Index
#
# Maps topics and keywords to the documents that define the relevant standards.
# All paths are relative to the project root (i.e., .gunawan/ prefix is included).
# Used by /foundation:inject-standards to auto-load relevant context.
# Update this file whenever a new standards document is added.

